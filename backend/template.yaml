AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Static-Analyzer
  SAM Template for Static Analyzer Backend and Frontend Hosting

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Runtime: python3.10
    Environment:
      Variables:
        UPLOAD_BUCKET_NAME: !Ref UploadsBucket
        CORS_ORIGIN: '*'

Resources:
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - PUT
              - POST
            AllowedOrigins:
              - '*' # In production, restrict this to your frontend URL
            MaxAge: 3600

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Action:
              - 's3:GetObject'
            Effect: Allow
            Resource: !Sub 'arn:aws:s3:::${FrontendBucket}/*'
            Principal: '*'

  FlaskApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS,PUT,DELETE'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  FlaskApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: lambda_handler.lambda_handler
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadsBucket
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
      Events:
        ProxyApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref FlaskApi
            Path: /
            Method: ANY
        ProxyApiGreedy:
          Type: Api
          Properties:
            RestApiId: !Ref FlaskApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL for Prod environment"
    Value: !Sub "https://${FlaskApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  
  FrontendWebsiteUrl:
    Description: "URL for the hosted frontend website"
    Value: !GetAtt FrontendBucket.WebsiteURL

  UploadsBucketName:
    Description: "Name of the S3 bucket used for uploads"
    Value: !Ref UploadsBucket
